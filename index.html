<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/style.css">
    <title>Passenger Counter </title>
</head>
<body>
     <div>
    <div class="above"></div>
    <div class="box">
      <div
        class="topStripe"
        class="resetBtn"
        id="reset-btn">
        <button class="resetBtn" id="reset-btn">Reset</button>
      </div>
      <h2 class="mainTitle">People Entered:</h2>
      <h2 class="peopleCounter" id="people-counter">0</h2>
      <button class="visitedBtn" id="visited-btn">
        Visited
      </button>
      <button class="saveBtn" id="save-btn">Save</button>
      <p class="previousEntries" id="previous-entries">
        Previous Entries: <span></span>
      </p>
      <div class="bottomStripe"><span class="dot"></span>
      </div>
      <script src="/src/index.js"></script>
    </div>
</body>
</html>
